<!DOCTYPE html>
<html>
<head>
  <title>Simple Game</title>
</head>
<body>

<canvas id="gameCanvas" width="700" height="750" style="border:8px solid black;"  ></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
  x: 25,
  y:25,
  radius:15,
  width: 40,
  height: 40,
  speed: 8
};

let tri = {
x:230,
y:10,
width: 40, 
height: 40, 
speed: 12
};

let tri1 = {
x:6,
y:190,
width: 40, 
height: 40, 
speed: 12
};

let tri2 = {
x:6,
y:500,
width: 40, 
height: 40, 
speed: 12
};

let tri3 = {
x:660,
y:5,
width: 40, 
height: 40, 
speed: 12
};

let tri4 = {
x:500,
y:710,
width: 40, 
height: 40, 
speed: 12
};


let nextX = player.x +player.speed;
let nextY = player.y +player.speed;
let keys = {};

let showBorder = true;
let showBorder2 = true; 
let showBorder3 = true; 

let walls = [
  {x:50, y:50, width:170, height:130},
  {x:280, y:50, width:140, height:130},
  {x:480, y:0, width:60, height:180},
  {x:60, y:230, width:160, height:50},
  {x:280, y:230, width:50, height:260},
  {x:0, y:340, width:220, height:150},
  {x:300, y:330, width:130, height:50},
  {x:390, y:230, width:260, height:50},
  {x:490, y:250, width:67, height:130},
  {x:60, y:550, width:210, height:150},
  {x:330, y:550, width:60, height:210},
  {x:600, y:50, width:50, height:130},
  {x:390, y:440, width:220, height:50},
  {x:610, y:340, width:40, height:150},
  {x:550, y:540, width:100, height:150},
  {x:450, y:480, width:40, height:220}
];

let disappearWall = {
  x: 330,
  y: 235,
  width: 60,
  height: 40
};
setInterval(function()
{showBorder = !showBorder;},4000);

let disappearWall2 = {
 x:613,
 y:280, 
 width:35,
 height:60
};
setInterval(function()
{showBorder2 = !showBorder2;},2000);


let disappearWall3 = {
 x:330,
 y:443, 
 width:60,
 height:45
};
setInterval(function()
{showBorder3 = !showBorder2;},2000);



document.addEventListener("keydown", function(event) {
  keys[event.key] = true;
});

document.addEventListener("keyup", function(event) {
  keys[event.key] = false;
});
function drawPlayer() {

ctx.beginPath();
ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
ctx.fillStyle = "black";
ctx.fill();

ctx.beginPath();
ctx.moveTo(tri.x + tri.width/2, tri.y);
ctx.lineTo(tri.x, tri.y + tri.height);
ctx.lineTo(tri.x + tri.width, tri.y+tri.height);

ctx.moveTo(tri1.x + tri1.width/2, tri1.y);
ctx.lineTo(tri1.x, tri1.y + tri1.height);
ctx.lineTo(tri1.x + tri1.width, tri1.y+tri1.height);

ctx.moveTo(tri2.x + tri2.width/2, tri2.y);
ctx.lineTo(tri2.x, tri2.y + tri2.height);
ctx.lineTo(tri2.x + tri2.width, tri2.y+tri2.height);

ctx.moveTo(tri3.x + tri3.width/2, tri3.y);
ctx.lineTo(tri3.x, tri3.y + tri3.height);
ctx.lineTo(tri3.x + tri3.width, tri3.y+tri3.height);

ctx.moveTo(tri4.x + tri4.width/2, tri4.y);
ctx.lineTo(tri4.x, tri4.y + tri4.height);
ctx.lineTo(tri4.x + tri4.width, tri4.y+tri4.height);



ctx.closePath();
ctx.fillStyle="red";
ctx.fill();

}


let showBorders = true;
let wall = {
    x: 100,
    y: 100,
    width: 200,
    height: 150
};


function drawFrames()
{
    ctx.strokeStyle ="black";
    ctx.lineWidth =3;

    ctx.fillStyle = "black";
    ctx.fillRect(50, 50, 170, 130);
    ctx.fillRect(280, 50, 140, 130);
    ctx.fillRect(480,0,60,180);
    ctx.fillRect(50,230,160,50);
    ctx.fillRect(280,230,50,260)
    ctx.fillRect(0,340,220,150);
    ctx.fillRect(300,330,130,50);
    ctx.fillRect(390,230,260,50);
    ctx.fillRect(490,250,65,130);
    ctx.fillRect(60,550,210,150);
    ctx.fillRect(330,550,60,210);
    ctx.fillRect(600,50,50,130);
    ctx.fillRect(390,440,220,50);
    ctx.fillRect(610,340,40,150);
    ctx.fillRect(550,550,100,150);
    ctx.fillRect(450,480,40,220)

    ctx.fillStyle = "green";
    ctx.fillRect(0,0,50,50);
    ctx.fillRect(650,700,50,50);


if (showBorder) {
  ctx.strokeStyle = "black";
  ctx.fillStyle = "black";
  ctx.fillRect(330,230,60,50);
  ctx.lineWidth = 5;
  ctx.strokeRect(disappearWall.x, disappearWall.y, disappearWall.width, disappearWall.height);}

if (showBorder2) {
  ctx.strokeStyle = "black";
  ctx.fillStyle = "black";
  ctx.fillRect(613,280,35,60);
  ctx.lineWidth = 5;
  ctx.strokeRect(disappearWall2.x, disappearWall2.y, disappearWall2.width, disappearWall2.height);
}

if (showBorder3) {
  ctx.strokeStyle = "black";
  ctx.fillStyle = "black";
  ctx.fillRect(330,443,60,45);
  ctx.lineWidth = 5;
  ctx.strokeRect(disappearWall3.x, disappearWall3.y, disappearWall3.width, disappearWall3.height);
}

    
}

direction = "down"
direction2 = "right"
direction3 = "down"
direction4 = "right"
direction5 = "left"
function movePlayer() {

//For Circle
  let nextX = player.x;
  let nextY = player.y;

  if (keys["ArrowUp"]) {
    nextY -= player.speed;
  }

  if (keys["ArrowDown"]) {
    nextY += player.speed;
  }

  if (keys["ArrowLeft"]) {
    nextX -= player.speed;
  }

  if (keys["ArrowRight"]) {
    nextX += player.speed;
  }

  let canMove = true;

  if (
    nextX - player.radius < 0 ||
    nextX + player.radius > canvas.width ||
    nextY - player.radius < 0 ||
    nextY + player.radius > canvas.height
  ) {
    canMove = false;
  }

  for (let wall of walls) {
    if (
      nextX + player.radius > wall.x &&
      nextX - player.radius < wall.x + wall.width &&
      nextY + player.radius > wall.y &&
      nextY - player.radius < wall.y + wall.height
    ) {
      canMove = false;
    }
  }

  if (canMove) {
    player.x = nextX;
    player.y = nextY;
  }


//For the Triangle1
if (direction==="down")
{
    tri.y +=tri.speed;
      
    if(tri.y>=500)
    {  
        direction = "up"
    }
}
else if(direction==="up")
{
    tri.y-=tri.speed
    if(tri.y<=10)
    {
        direction ="down"
    }
}

//For the Triangle2
if (direction2==="right")
{
    tri1.x +=tri1.speed;
      
    if(tri1.x>=650)
    {  
        direction2 = "left"
    }
}
else if(direction2==="left")
{
    tri1.x-=tri1.speed
    if(tri1.x<=10)
    {
        direction2 ="right"
    }
}

//For the Triangle3
if (direction3==="down")
{
    tri3.y +=tri3.speed;
      
    if(tri3.y>=630)
    {  
        direction3 = "up"
    }
}
else if(direction3==="up")
{
    tri3.y-=tri3.speed
    if(tri3.y<=10)
    {
        direction3 ="down"
    }
}

//For Triangle4
if (direction4==="right")
{
    tri2.x +=tri2.speed;
      
    if(tri2.x>=400)
    {  
        direction4 = "left"
    }
}
else if(direction4==="left")
{
    tri2.x-=tri2.speed
    if(tri2.x<=10)
    {
        direction4 ="right"
    }
}

//For Triangle5
if (direction5==="right")
{
    tri4.y +=tri4.speed;
      
    if(tri4.y>=700)
    {  
        direction5 = "left"
    }
}
else if(direction5==="left")
{
    tri4.y-=tri4.speed
    if(tri4.y<=500)
    {
        direction5 ="right"
    }
}
if (showBorder) {
  if (
    nextX + player.radius > disappearWall.x &&
    nextX - player.radius < disappearWall.x + disappearWall.width &&
    nextY + player.radius > disappearWall.y &&
    nextY - player.radius < disappearWall.y + disappearWall.height
  ) {
    canMove = false;
  }
}


}
let messageShown = false
function isColliding(circle, triangle) {
  return (
    circle.x + circle.radius > triangle.x &&
    circle.x - circle.radius < triangle.x + triangle.width &&
    circle.y + circle.radius > triangle.y &&
    circle.y - circle.radius < triangle.y + triangle.height
  );
}


function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  movePlayer();
  drawFrames();
  drawPlayer();


 if((isColliding(player, tri)|| isColliding(player,tri1)|| isColliding(player,tri2)||isColliding(player,tri3)||isColliding(player,tri4))&& messageShown===false)
{
messageShown=true;
alert("You have lost");

}
  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", function(event) {
  keys[event.key] = true;

  if (event.key === "b") {
    showBorder = !showBorder;
  }
});
gameLoop();
</script>

</body>
</html>
